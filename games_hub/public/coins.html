<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>🪙 Coin Rush</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1a0d;color:#eee;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh}
#join{text-align:center}#join h1{font-size:2rem;margin-bottom:8px}#join p{color:#888;margin-bottom:20px}
input{padding:10px 18px;font-size:1rem;border-radius:8px;border:2px solid #333;background:#111;color:#fff;outline:none;width:240px}
input:focus{border-color:#ffd740}
button{display:block;margin:12px auto 0;padding:10px 36px;font-size:1rem;background:#f9a825;color:#000;border:none;border-radius:8px;cursor:pointer;font-weight:bold}
#game{display:none;flex-direction:column;align-items:center;gap:8px}
#bar{display:flex;justify-content:space-between;align-items:center;width:900px}
#timer-box{font-size:1.2rem;font-weight:bold;color:#ffd740}
#plist{display:flex;gap:8px;flex-wrap:wrap;font-size:0.8rem}
.pt{padding:2px 10px;border-radius:10px;background:#1a2a0d}
canvas{border-radius:10px}#hint{font-size:0.78rem;color:#444}
#ov{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;font-size:1.1rem}
#ov.h{display:none}#ov .big{font-size:2.2rem;font-weight:bold}#ov .cd{font-size:4rem;font-weight:bold;color:#ffd740}
#ov button{padding:10px 30px;background:#f9a825;color:#000;border:none;border-radius:8px;cursor:pointer;font-size:1rem;font-weight:bold}
#scoreboard{background:#111;border-radius:10px;padding:12px 24px;text-align:left;min-width:200px}
#scoreboard div{padding:4px 0;border-bottom:1px solid #222;font-size:0.95rem}
</style></head><body>
<div id="join"><h1>🪙 Coin Rush</h1><p>Collect coins & steal from others. Most in 60s wins!</p>
<input id="ni" maxlength="14" placeholder="Your name..."/>
<button onclick="join()">Join Game</button>
<p id="fm" style="color:#ffd740;margin-top:10px;display:none">Game is full!</p></div>

<div id="game"><div id="bar">
  <div id="timer-box">⏱ 60s</div>
  <div id="plist"></div>
</div>
<canvas id="c" width="900" height="600"></canvas>
<div id="hint">WASD / Arrow Keys · Bump players to steal 3 coins!</div></div>

<div id="ov"><div class="big" id="ot"></div><div id="om"></div><div class="cd" id="ocd"></div>
<div id="scoreboard" style="display:none"></div>
<button id="ob" onclick="restart()" style="display:none">Play Again</button></div>

<script src="/socket.io/socket.io.js"></script><script src="shared.js"></script>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const W=900,H=600,R=20,CR=12;
const socket=io('/coins');
let myId=socket.id,state=null,keys={};
let particles=new Particles(),floats=new FloatText();
let coinAnim=0;
let bgStars=makeStars(40,W,H).map(s=>({...s,b:s.b*.3}));

socket.on('connect',()=>myId=socket.id);
socket.on('full',()=>document.getElementById('fm').style.display='block');
socket.on('countdown',n=>{SFX.countdown();showOv('🪙 Game starting in...',`${state?.players?.length||'?'} players`,n,false);});
socket.on('started',()=>{hideOv();SFX.go();});
socket.on('state',s=>{state=s;updateUI();});
socket.on('collected',(d)=>{SFX.coin();particles.emit(d.x,d.y,12,['#ffd740','#fff176','#ffca28','#fff'],5,0);floats.add(d.x,d.y-20,'+1','#ffd740',16);});
socket.on('bump',d=>{SFX.bump();shake(6);particles.emit(d.ax,d.ay,10,['#ff7043','#ffb74d'],4);floats.add(d.ax,d.ay-25,'STEAL!','#ff7043',15);});
socket.on('gameover',d=>{
  SFX.win();
  const sb=document.getElementById('scoreboard');
  if(d.scores){sb.style.display='block';sb.innerHTML=d.scores.map((s,i)=>`<div>${i===0?'🥇':i===1?'🥈':'🥉'} ${s.name}: ${s.score} coins</div>`).join('');}
  showOv('🏆 '+d.winner+' wins!','Final scores:','',true);
});

function join(){const n=document.getElementById('ni').value.trim();if(!n)return;document.getElementById('join').style.display='none';document.getElementById('game').style.display='flex';socket.emit('join',n);}
document.getElementById('ni').onkeydown=e=>{if(e.key==='Enter')join();};
window.onkeydown=e=>{keys[e.key]=true;socket.emit('keys',keys);if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();};
window.onkeyup=e=>{keys[e.key]=false;socket.emit('keys',keys);};
function restart(){socket.emit('restart');hideOv();document.getElementById('scoreboard').style.display='none';}
function showOv(t,m,cd,btn){document.getElementById('ot').textContent=t;document.getElementById('om').textContent=m;document.getElementById('ocd').textContent=cd;document.getElementById('ob').style.display=btn?'block':'none';document.getElementById('ov').classList.remove('h');}
function hideOv(){document.getElementById('ov').classList.add('h');}
function updateUI(){
  if(!state)return;
  document.getElementById('timer-box').textContent='⏱ '+state.gameTime+'s';
  const sorted=[...state.players].sort((a,b)=>b.score-a.score);
  document.getElementById('plist').innerHTML=sorted.map(p=>`<span class="pt" style="color:${p.color}">${p.name}: ${p.score}🪙</span>`).join('');
}

function drawCoin(x,y,r,spin){
  const scaleX=Math.cos(spin);
  ctx.save();ctx.translate(x,y);ctx.scale(scaleX,1);
  const g=ctx.createRadialGradient(0,0,1,0,0,r);
  g.addColorStop(0,'#fff9c4');g.addColorStop(.5,'#ffd740');g.addColorStop(1,'#f57f17');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#f57f17';ctx.lineWidth=1.5;ctx.stroke();
  ctx.restore();
}

function loop(){
  coinAnim+=0.05;
  ctx.save();
  ctx.fillStyle='#0d1a0d';ctx.fillRect(0,0,W,H);
  // Grid
  ctx.strokeStyle='rgba(100,200,100,.04)';ctx.lineWidth=1;
  for(let x=0;x<W;x+=50){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=50){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  applyShake(ctx);
  particles.update();particles.draw(ctx);

  if(state){
    // Coins
    state.coins.forEach(coin=>{
      const spin=coinAnim+coin.x*.01;
      drawCoin(coin.x,coin.y,CR,spin);
    });
    // Players
    const sorted=[...state.players].sort((a,b)=>b.score-a.score);
    state.players.forEach(p=>{
      const isMe=p.id===myId;
      const rank=sorted.findIndex(s=>s.id===p.id);
      if(isMe){ctx.shadowColor=p.color;ctx.shadowBlur=14;}
      ctx.beginPath();ctx.arc(p.x,p.y,R,0,Math.PI*2);ctx.fillStyle=p.color;ctx.fill();
      ctx.strokeStyle=isMe?'#fff':'rgba(255,255,255,.25)';ctx.lineWidth=isMe?3:1.5;ctx.stroke();
      ctx.shadowBlur=0;
      ctx.font='13px serif';ctx.textAlign='center';ctx.fillText('😊',p.x,p.y+5);
      ctx.font=`bold ${isMe?12:10}px Segoe UI`;ctx.fillStyle=isMe?'#fff':'#ccc';
      ctx.fillText(p.name,p.x,p.y-R-5);
      // Score badge
      ctx.font='bold 11px Segoe UI';ctx.fillStyle='#ffd740';
      ctx.fillText(p.score+'🪙',p.x,p.y+R+14);
      if(rank===0&&sorted.length>1){ctx.font='14px serif';ctx.fillText('👑',p.x,p.y-R-20);}
    });
  }
  floats.update();floats.draw(ctx);
  if(state&&!state.started){
    ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(0,H/2-35,W,70);
    ctx.fillStyle='#fff';ctx.font='bold 20px Segoe UI';ctx.textAlign='center';
    ctx.fillText(state.players.length<2?'⏳ Waiting for players...':'👥 '+state.players.length+' players ready',W/2,H/2+8);
  }
  ctx.restore();requestAnimationFrame(loop);
}
loop();
</script></body></html>
