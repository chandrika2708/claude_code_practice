<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>💣 Bomb Tag</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d1a;color:#eee;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh}
#join{text-align:center} #join h1{font-size:2rem;margin-bottom:8px} #join p{color:#888;margin-bottom:20px}
input{padding:10px 18px;font-size:1rem;border-radius:8px;border:2px solid #333;background:#111;color:#fff;outline:none;width:240px}
input:focus{border-color:#ef5350}
button{display:block;margin:12px auto 0;padding:10px 36px;font-size:1rem;background:#ef5350;color:#fff;border:none;border-radius:8px;cursor:pointer}
#game{display:none;flex-direction:column;align-items:center;gap:8px}
#bar{display:flex;justify-content:space-between;align-items:center;width:900px}
#badge{padding:5px 16px;border-radius:16px;font-weight:bold;background:#333}
#plist{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;font-size:0.8rem}
.pt{padding:2px 10px;border-radius:10px;background:#1a1a2e}
canvas{border-radius:10px}
#hint{font-size:0.78rem;color:#444}
#ov{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;font-size:1.2rem}
#ov.h{display:none} #ov .big{font-size:2.2rem;font-weight:bold} #ov .cd{font-size:4rem;font-weight:bold;color:#ef5350}
#ov button{padding:10px 30px;background:#ef5350;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:1rem}
</style></head><body>
<div id="join"><h1>💣 Bomb Tag</h1><p>Touch others to pass the bomb before it explodes!</p>
<input id="ni" maxlength="14" placeholder="Your name..."/>
<button onclick="join()">Join Game</button>
<p id="fm" style="color:#ef5350;margin-top:10px;display:none">Game is full!</p></div>

<div id="game"><div id="bar"><div id="badge">⏳ Waiting</div><div id="plist"></div></div>
<canvas id="c" width="900" height="600"></canvas>
<div id="hint">WASD / Arrow Keys to move &nbsp;·&nbsp; Bump the bomb holder to steal the bomb!</div></div>

<div id="ov"><div class="big" id="ot"></div><div id="om"></div><div class="cd" id="ocd"></div>
<button id="ob" onclick="restart()" style="display:none">Play Again</button></div>

<script src="/socket.io/socket.io.js"></script><script src="shared.js"></script>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const W=900,H=600,R=20;
const socket=io('/bomb');
let myId=socket.id,state=null,bombId=null,fuse=20,keys={},particles=new Particles(),floats=new FloatText();
let bgParticles=Array.from({length:30},()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*2+1,a:Math.random()*.4+.1}));
let flash=0;

socket.on('connect',()=>myId=socket.id);
socket.on('full',()=>document.getElementById('fm').style.display='block');

socket.on('countdown',n=>{SFX.countdown();showOv('💣 Game starting in...',`${Object.keys(state?.players||{}).length||'?'} players in lobby`,n,false);});
socket.on('started',d=>{bombId=d.bombId;hideOv();SFX.go();});
socket.on('newbomb',d=>{bombId=d.bombId;SFX.transfer();const p=state?.players?.find(p=>p.id===d.bombId);if(p)floats.add(p.x,p.y-30,'💣 BOMB!','#ff5252',20);});
socket.on('transfer',d=>{bombId=d.bombId;SFX.transfer();});
socket.on('tick',d=>{fuse=d.fuse;SFX.tick(d.fuse<=5);});
socket.on('boom',d=>{SFX.boom();shake(18);particles.emit(d.x,d.y,60,['#ff5722','#ff9800','#ffeb3b','#fff'],10,0.2);floats.add(d.x,d.y-40,'💥 BOOM!','#ff5722',26);flash=1;});
socket.on('state',s=>{state=s;fuse=s.fuse;updateUI();});
socket.on('gameover',d=>{SFX.win();showOv('🏆 '+d.winner+' wins!','Everyone else got blown up!','',true);});

function join(){
  const n=document.getElementById('ni').value.trim();if(!n)return;
  document.getElementById('join').style.display='none';
  document.getElementById('game').style.display='flex';
  socket.emit('join',n);
}
document.getElementById('ni').onkeydown=e=>{if(e.key==='Enter')join();};

window.onkeydown=e=>{keys[e.key]=true;socket.emit('keys',keys);if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();};
window.onkeyup=e=>{keys[e.key]=false;socket.emit('keys',keys);};

function restart(){socket.emit('restart');hideOv();}
function showOv(t,m,cd,btn){
  document.getElementById('ot').textContent=t;
  document.getElementById('om').textContent=m;
  document.getElementById('ocd').textContent=cd;
  document.getElementById('ob').style.display=btn?'block':'none';
  document.getElementById('ov').classList.remove('h');
}
function hideOv(){document.getElementById('ov').classList.add('h');}
function updateUI(){
  if(!state)return;
  const me=state.players.find(p=>p.id===myId);
  const badge=document.getElementById('badge');
  if(me){badge.textContent=bombId===myId?'💣 YOU HAVE THE BOMB!':me.alive?'🏃 Alive':'💀 Eliminated';}
  badge.style.background=bombId===myId?'#c62828':me?.alive?'#1b5e20':'#333';
  document.getElementById('plist').innerHTML=state.players.map(p=>`<span class="pt" style="color:${p.color}">${p.name}${p.id===bombId?' 💣':!p.alive?' 💀':''}</span>`).join('');
}

function loop(){
  ctx.save();
  // BG
  ctx.fillStyle='#0d0d1a';ctx.fillRect(0,0,W,H);
  if(flash>0){ctx.fillStyle=`rgba(255,87,34,${flash*.3})`;ctx.fillRect(0,0,W,H);flash=Math.max(0,flash-.04);}
  // Animated bg dots
  bgParticles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;
    ctx.fillStyle=`rgba(239,83,80,${p.a})`;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  });
  applyShake(ctx);
  particles.update();particles.draw(ctx);
  floats.update();

  if(state){
    state.players.forEach(p=>{
      if(!p.alive){
        ctx.save();ctx.globalAlpha=0.25;
        ctx.fillStyle='#555';ctx.beginPath();ctx.arc(p.x,p.y,R,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#888';ctx.font='14px serif';ctx.textAlign='center';ctx.fillText('💀',p.x,p.y+5);
        ctx.restore();return;
      }
      const isBomb=p.id===bombId;
      const isMe=p.id===myId;
      if(isBomb){
        const pulse=Math.sin(Date.now()/150)*6;
        ctx.shadowColor='#ff5722';ctx.shadowBlur=20+pulse;
        const frac=fuse/20;
        ctx.strokeStyle=frac<.3?'#ff1744':frac<.6?'#ff9800':'#ffeb3b';
        ctx.lineWidth=4;
        ctx.beginPath();ctx.arc(p.x,p.y,R+8,-Math.PI/2,-Math.PI/2+(1-frac)*Math.PI*2);ctx.stroke();
        ctx.shadowBlur=0;
      }
      if(isMe){ctx.shadowColor=p.color;ctx.shadowBlur=16;}
      ctx.beginPath();ctx.arc(p.x,p.y,R,0,Math.PI*2);
      ctx.fillStyle=isBomb?'#c62828':p.color;ctx.fill();
      ctx.strokeStyle=isMe?'#fff':'rgba(255,255,255,.3)';ctx.lineWidth=isMe?3:1.5;ctx.stroke();
      ctx.shadowBlur=0;
      ctx.font='14px serif';ctx.textAlign='center';ctx.fillText(isBomb?'💣':'😊',p.x,p.y+5);
      ctx.font=`bold ${isMe?12:10}px Segoe UI`;ctx.fillStyle=isMe?'#fff':'#ccc';
      ctx.fillText(p.name,p.x,p.y-R-5);
      if(isBomb){ctx.font='bold 16px Segoe UI';ctx.fillStyle='#ff5722';ctx.fillText(fuse+'s',p.x,p.y-R-22);}
    });
  }
  floats.draw(ctx);
  if(state&&!state.started){
    ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(0,H/2-35,W,70);
    ctx.fillStyle='#fff';ctx.font='bold 20px Segoe UI';ctx.textAlign='center';
    ctx.fillText(state.players.length<2?'⏳ Waiting for players...':'👥 '+state.players.length+' players ready',W/2,H/2+8);
  }
  ctx.restore();requestAnimationFrame(loop);
}
loop();
</script></body></html>
